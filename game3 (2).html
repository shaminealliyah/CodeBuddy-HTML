<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Match-3 HTML Game</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#dbe6ff;
      display:flex;
      flex-direction:column;
      align-items:center;
      min-height:100vh;
    }

    /* TOP BAR */

    .top-bar{
      width:100%;
      background:white;
      padding:20px 40px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:3px solid #d3d3d3;
    }

    .title{
      font-size:32px;
      font-weight:900;
      color:#ff4a4a;
    }

    .score-board{
      font-size:24px;
      font-weight:bold;
    }

    /* GAME BOARD */

    .board{
      width:480px;
      height:480px;

      margin-top:40px;

      display:grid;
      grid-template-columns:repeat(6, 1fr);
      gap:5px;
    }

    /* BOX */

    .cell{
      background:white;
      border:3px solid black;
      border-radius:12px;

      display:flex;
      justify-content:center;
      align-items:center;

      font-size:20px;
      font-weight:bold;

      cursor:pointer;
      user-select:none;

      transition:0.2s;
    }

    .cell:hover{
      transform:scale(1.05);
    }

    .selected{
      background:#ffdfdf;
      border:4px solid #ff4a4a;
    }

    /* INSTRUCTION */

    .instruction{
      margin-top:25px;
      background:white;
      padding:15px 25px;
      border-radius:15px;
      font-size:18px;
      font-weight:bold;
    }

    /* GAME OVER */

    .game-over{
      position:fixed;
      top:50%;
      left:50%;

      transform:translate(-50%, -50%);

      background:white;
      padding:40px;

      border-radius:20px;

      text-align:center;

      display:none;

      box-shadow:0 0 20px rgba(0,0,0,0.3);
    }

    .game-over h1{
      font-size:50px;
      color:#ff4a4a;
      margin-bottom:20px;
    }

    .game-over button{
      margin-top:20px;

      padding:15px 30px;

      background:#ff4a4a;
      color:white;

      border:none;
      border-radius:12px;

      font-size:20px;
      cursor:pointer;
    }

  </style>

</head>

<body>

  <!-- TOP BAR -->

  <div class="top-bar">

    <div class="title">
      MATCH-3
    </div>

    <div class="score-board">
      Score:
      <span id="score">0</span>
    </div>

  </div>

  <!-- INSTRUCTION -->

  <div class="instruction">
    Match 3 same HTML tags in a row!
  </div>

  <!-- GAME BOARD -->

  <div class="board" id="board"></div>

  <!-- GAME OVER -->

  <div class="game-over" id="gameOver">

    <h1>YOU WIN!</h1>

    <p style="font-size:25px;">
      Final Score:
      <span id="finalScore"></span>
    </p>

    <button onclick="restartGame()">
      PLAY AGAIN
    </button>

  </div>

  <script>

    let board =
    document.getElementById("board");

    let scoreText =
    document.getElementById("score");

    let score = 0;

    let selectedCell = null;
    let gameFinished = false;

    // HTML TAGS

    let tags = [

      "&lt;h1&gt;",
      "&lt;p&gt;",
      "&lt;div&gt;",
      "&lt;img&gt;",
      "&lt;a&gt;"

    ];

    // CREATE BOARD

    function createBoard(){

      for(let i = 0; i < 36; i++){

        let cell =
        document.createElement("div");

        cell.classList.add("cell");

        let randomTag =
        tags[Math.floor(Math.random() * tags.length)];

        cell.innerHTML = randomTag;

        cell.addEventListener("click", function(){

          selectCell(cell);

        });

        board.appendChild(cell);

      }

    }

    // SELECT CELL

    function selectCell(cell){

      // FIRST SELECT

      if(selectedCell == null){

        selectedCell = cell;

        cell.classList.add("selected");

      }

      // SECOND SELECT

      else{

        swapCells(selectedCell, cell);

        selectedCell.classList.remove("selected");

        selectedCell = null;

        checkMatches();

      }

    }

    // SWAP CELLS

    function swapCells(cell1, cell2){

      let temp = cell1.innerHTML;

      cell1.innerHTML = cell2.innerHTML;

      cell2.innerHTML = temp;

    }

    function saveMatch3Score() {
  let progress = {};

  try {
    const savedData = JSON.parse(
      localStorage.getItem("studentProgress")
    );

    if (savedData && typeof savedData === "object") {
      progress = savedData;
    }
  } catch (error) {
    progress = {};
  }

  progress.arcadeProgress = {
    ...(progress.arcadeProgress || {}),
    match3Html: score
  };

  localStorage.setItem(
    "studentProgress",
    JSON.stringify(progress)
  );
}

    // CHECK MATCHES

    function checkMatches(){

      let cells =
      document.querySelectorAll(".cell");

      // CHECK ROWS

      for(let i = 0; i < 36; i++){

        // AVOID EDGE BREAK

        if(i % 6 > 3) continue;

        let tag1 = cells[i].innerHTML;
        let tag2 = cells[i + 1].innerHTML;
        let tag3 = cells[i + 2].innerHTML;

        if(tag1 == tag2 && tag2 == tag3){

          cells[i].style.background = "#9cff9c";
          cells[i + 1].style.background = "#9cff9c";
          cells[i + 2].style.background = "#9cff9c";

          score += 10;

          scoreText.innerHTML = score;

          // NEW RANDOM TAGS

          setTimeout(function(){

            cells[i].innerHTML =
            tags[Math.floor(Math.random() * tags.length)];

            cells[i + 1].innerHTML =
            tags[Math.floor(Math.random() * tags.length)];

            cells[i + 2].innerHTML =
            tags[Math.floor(Math.random() * tags.length)];

            cells[i].style.background = "white";
            cells[i + 1].style.background = "white";
            cells[i + 2].style.background = "white";

          }, 300);

        }

      }

      // WIN CONDITION

      if(score >= 100 && !gameFinished){

  gameFinished = true;

  document.getElementById("gameOver").style.display =
  "block";

  document.getElementById("finalScore").innerHTML =
  score;

  saveMatch3Score();

}

    }

    // RESTART

    function restartGame(){

      location.reload();

    }

    // START GAME

    createBoard();

  </script>

</body>
</html>
